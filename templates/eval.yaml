# canon alpha eval. Replace the fixture paths below with your own.
# NOTE: `metric` and `threshold` are advisory — the runner
# (hooks/scripts/canon-eval.sh) does not enforce them. It grades each task and
# prints a score: `command` output if present, otherwise the text of `input`.
# To measure a skill's behavior, point `command` at something that runs the skill.
# YAML needs PyYAML; copy this to a .json eval to run without that dependency.
name: example-skill-eval
skill: skills/example/SKILL.md
metric: pass_rate
threshold:
  accept: strict_improvement
tasks:
  - id: required-phrases
    input: fixtures/example/output.md
    expected:
      contains:
        - "specific output"
        - "stopping condition"
      not_contains:
        - "generic advice"
      regex:
        - "## (Workflow|Procedure)"

  - id: command-output
    expected:
      command: "printf '%s\n' '{\"status\":\"ok\"}'"
      json_schema:
        type: object
        required:
          - status

  # Size budget — deterministic proxy for token cost. Used by
  # `canon optimize <context-file>` to prove a prune cut cost. Pair with a
  # `command` task that runs your project's tests to confirm behavior held.
  - id: under-budget
    input: CLAUDE.md
    expected:
      max_chars: 4000
